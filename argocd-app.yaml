apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ai-api

  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/TON_USERNAME/ai-gitops-project.git
    targetRevision: master
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true